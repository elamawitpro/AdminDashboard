<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - User Dashboard</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f3e7fa 0%, #e3f0ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-container {
            max-width: 410px;
            margin: 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(120, 72, 232, 0.13), 0 1.5px 8px rgba(120, 72, 232, 0.10);
            padding: 48px 32px 40px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .login-icon {
            font-size: 48px;
            color: #7848e8;
            margin-bottom: 10px;
            display: inline-block;
            background: linear-gradient(135deg, #e3d6ff 0%, #b47aff 100%);
            border-radius: 50%;
            padding: 12px 16px 10px 16px;
            box-shadow: 0 2px 8px rgba(120, 72, 232, 0.10);
        }
        .logout-container h1 {
            color: #7848e8;
            margin-bottom: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .login-form label {
            color: #7848e8;
            font-weight: 600;
        }
        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            padding: 11px 15px;
            border: 1.5px solid #d1c4e9;
            border-radius: 7px;
            font-size: 15px;
            background: #faf8ff;
            margin-bottom: 8px;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .login-form input[type="text"]:focus,
        .login-form input[type="password"]:focus {
            border-color: #7848e8;
            box-shadow: 0 0 0 2px #e3d6ff;
            outline: none;
        }
        .btn-primary {
            background: linear-gradient(90deg, #7848e8 60%, #b47aff 100%);
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 12px 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(120, 72, 232, 0.10);
            transition: background 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .btn-primary:hover {
            background: linear-gradient(90deg, #6a38d8 60%, #a46aff 100%);
            box-shadow: 0 4px 16px rgba(120, 72, 232, 0.13);
        }
        .logout-container p {
            color: #888;
            margin-top: 28px;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <span class="login-icon">🔒</span>
        <h1>Login</h1>
        <form class="login-form" autocomplete="off" style="margin-top:24px;">
            <a href="../HTML/index.html" class="btn-primary" style="width:100%;display:inline-block;text-align:center;text-decoration:none;">Login</a>
        </form>
        <p>You have been logged out.<br>Sign in again to continue.</p>
    </div>
</body>
</html>
