<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - User Dashboard</title>
    <link rel="stylesheet" href="../CSS/settings.css">
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JS/theme.js"></script>
</head>
<body>
    <div class="dashboard">
        <header class="dashboard-header">
            <div class="header-content">
                <h1>Settings</h1>
                <nav class="top-nav">
                    <ul>
                        <li><a href="#notifications">Notifications</a></li>
                        <li><a href="../HTML/settings.html" class="active">Settings</a></li>
                        <li><a href="#help">Help</a></li>
                    </ul>
                </nav>
            </div>
            <div class="user-profile">
                <img src="../img/IMG_20230821_183748_189.jpg" alt="User Avatar" class="avatar">
                <span>Welcome, Selamawit Worku!</span>
            </div>
        </header>
        <nav class="sidebar">
            <ul>
                <li><a href="../HTML/dashboard.html">Dashboard</a></li>
                <li><a href="../HTML/analytics.html">Analytics</a></li>
                <li><a href="../HTML/users.html">Users</a></li>
                <li><a href="../HTML/report.html">Reports</a></li>
                <li><a href="../HTML/settings.html" class="active">Settings</a></li>
                <li><a href="../HTML/logout.html">Logout</a></li>
            </ul>
        </nav>
        <main class="main-content">
            <section class="settings-section">
                <h2>Account Settings</h2>
                <form class="settings-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" value="Selamawit Worku">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" value="selamawit@example.com">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" placeholder="Change password">
                        </div>
                        <div class="form-group">
                            <label for="language">Language</label>
                            <select id="language" name="language">
                                <option value="en">English</option>
                                <option value="am">Amharic</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="toggle-label" for="theme-toggle">
                                Theme
                                <input type="checkbox" id="theme-toggle" name="theme-toggle">
                                <span class="toggle-switch"></span>
                                <span style="font-weight:400;font-size:15px;">Dark Mode</span>
                            </label>
                        </div>
                        <div class="form-group">
                            <label class="toggle-label" for="notifications">
                                Notifications
                                <input type="checkbox" id="notifications" name="notifications" checked>
                                <span class="toggle-switch"></span>
                                <span style="font-weight:400;font-size:15px;">Enable email notifications</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">Save Changes</button>
                        <button type="reset" class="btn-secondary">Reset</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
